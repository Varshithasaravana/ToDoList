{% extends "base.html" %}
{% block content %}
<div class="text-center bg-info">
<h1 class="text-primary">TO-DO-LIST</h1>

<form method="POST">

    {% csrf_token %}

    {{form.title}}

    <input
        type="submit"
        value="Add"
        class="btn btn-primary"
    >

</form>

<br>

{% for task in tasks %}

<div class="border rounded-3 p-3 mb-3 m-3">

    <div class="d-flex justify-content-between align-items-center">

   {% if task.completed %}

    <p class="mb-0 fs-5">
        <strike>{{task}}</strike>
    </p>

{% else %}

    <p class="mb-0 fs-5">
        {{task}}
    </p>

{% endif %}

       

        <!-- BUTTONS -->

        <div class="d-flex gap-2">

            <a
                href="{% url 'update_task' task.id %}"
                class="btn btn-warning btn-sm"
            >
                Update
            </a>

            <a
                href="{% url 'delete_task' task.id %}"
                class="btn btn-danger btn-sm"
            >
                Delete
            </a>

        </div>

    </div>

</div>
   
{% endfor %}
</div>
{% endblock content %}
