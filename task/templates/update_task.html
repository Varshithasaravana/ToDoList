{% extends "base.html" %}

{% block content %}

<div class="w-50 mx-auto border rounded-3 p-4 shadow-sm mt-5 bg-light">

    <h1 class="text-warning text-center">
        Update Task
    </h1>

    <form method="POST">

        {% csrf_token %}

        {{forms}}

        <br><br>

        <div class="text-center">

            <input

            >

        </div>

    </form>

</div>

{% endblock content %}
